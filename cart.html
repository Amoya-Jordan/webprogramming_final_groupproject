<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart &mdash; Auriva</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">AURI<span>VA</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>

  <!-- Cart Section — JS Q2a -->
  <section class="cart-section">
    <h2>Your Cart</h2>

    <!-- JS Q2a: getElementById("cart-items") -->
    <div id="cart-items">
      <div class="empty-cart">
        <p>Your cart is empty.</p>
        <a href="product.html" class="btn">Continue Shopping</a>
      </div>
    </div>

    <!-- Order Summary — JS Q2a -->
    <div class="cart-summary">
      <h3>Order Summary</h3>
      <!-- JS Q2d: Arithmetic — subtotal, tax (15%), grand total calculated in script.js -->
      <p id="cart-subtotal">Subtotal: JMD $0</p>
      <p id="cart-tax">Tax (15%): JMD $0</p>
      <p id="cart-total">Grand Total: JMD $0</p>

      <div class="cart-actions">
        <!-- JS Q2b: onclick event handler -->
        <button class="btn btn-outline" onclick="clearCart()">Clear Cart</button>
        <a href="checkout.html" class="btn">Proceed to Checkout</a>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 <span>Auriva</span> Essential Oils &nbsp;&middot;&nbsp; Pure. Natural. Yours.</p>
  </footer>

</body>
</html>
